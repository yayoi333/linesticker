name: Deploy site to GitHub Pages

# main または作業ブランチへの push、もしくは手動実行でデプロイ
on:
  push:
    branches:
      - main
      - claude/happy-allen-r1Ibj
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1本に絞る（古いデプロイはキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pages を有効化（未設定なら自動でオンにする）
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # リポジトリ直下（index.html がある場所）を成果物としてアップロード
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
