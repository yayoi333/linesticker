<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 440" role="img" aria-label="制作者のアバターイラスト">
  <defs>
    <linearGradient id="aboutBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF1EA"/>
      <stop offset="1" stop-color="#FFE0EE"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="420" height="420" rx="40" fill="url(#aboutBg)"/>

  <!-- desk / tablet -->
  <rect x="120" y="318" width="200" height="92" rx="16" fill="#FFFFFF" stroke="#3A3A3A" stroke-width="6"/>
  <rect x="140" y="338" width="160" height="52" rx="8" fill="#E9FBF6"/>
  <path d="M158 372 q18 -26 40 -8 q14 -22 36 -4" fill="none" stroke="#4ECDC4" stroke-width="6" stroke-linecap="round"/>
  <!-- stylus -->
  <rect x="296" y="296" width="14" height="78" rx="7" fill="#FF7A59" stroke="#3A3A3A" stroke-width="5" transform="rotate(34 303 335)"/>

  <!-- character (artist) -->
  <!-- hair back -->
  <path d="M138 196 q82 -118 164 0 q12 78 -10 120 l-144 0 q-22 -42 -10 -120 Z" fill="#5C4A45"/>
  <!-- face -->
  <circle cx="220" cy="196" r="86" fill="#FFE7D3" stroke="#3A3A3A" stroke-width="5"/>
  <!-- hair front -->
  <path d="M136 188 q4 -96 84 -106 q80 10 84 106 q-30 -44 -84 -36 q-54 -8 -84 36 Z" fill="#6B564F"/>
  <!-- cheeks -->
  <circle cx="178" cy="214" r="16" fill="#FFAFA0" opacity="0.8"/>
  <circle cx="262" cy="214" r="16" fill="#FFAFA0" opacity="0.8"/>
  <!-- eyes -->
  <circle cx="190" cy="194" r="9" fill="#3A3A3A"/>
  <circle cx="250" cy="194" r="9" fill="#3A3A3A"/>
  <circle cx="187" cy="190" r="3" fill="#FFFFFF"/>
  <circle cx="247" cy="190" r="3" fill="#FFFFFF"/>
  <!-- smile -->
  <path d="M204 224 q16 16 32 0" fill="none" stroke="#3A3A3A" stroke-width="6" stroke-linecap="round"/>
  <!-- body / shirt -->
  <path d="M150 330 q14 -64 70 -64 q56 0 70 64 Z" fill="#FF7A59"/>
  <path d="M150 330 q14 -64 70 -64 q56 0 70 64" fill="none" stroke="#3A3A3A" stroke-width="5"/>
</svg>
