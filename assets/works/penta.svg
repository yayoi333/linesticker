<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="ペンギンキャラクター ぺんた">
  <defs>
    <linearGradient id="bgPen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E6F4FF"/>
      <stop offset="1" stop-color="#C2E4FB"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="360" height="360" rx="56" fill="url(#bgPen)"/>
  <!-- body -->
  <ellipse cx="200" cy="216" rx="112" ry="128" fill="#3C4A57" stroke="#2A333C" stroke-width="7"/>
  <!-- belly -->
  <ellipse cx="200" cy="232" rx="78" ry="104" fill="#FFFFFF"/>
  <!-- wings -->
  <path d="M92 200 q-14 50 12 96 q18 -10 22 -40 Z" fill="#3C4A57" stroke="#2A333C" stroke-width="6"/>
  <path d="M308 200 q14 50 -12 96 q-18 -10 -22 -40 Z" fill="#3C4A57" stroke="#2A333C" stroke-width="6"/>
  <!-- cheeks -->
  <circle cx="152" cy="206" r="18" fill="#FF9DB0" opacity="0.85"/>
  <circle cx="248" cy="206" r="18" fill="#FF9DB0" opacity="0.85"/>
  <!-- surprised eyes -->
  <circle cx="172" cy="180" r="14" fill="#FFFFFF" stroke="#2A333C" stroke-width="4"/>
  <circle cx="228" cy="180" r="14" fill="#FFFFFF" stroke="#2A333C" stroke-width="4"/>
  <circle cx="172" cy="182" r="7" fill="#2A333C"/>
  <circle cx="228" cy="182" r="7" fill="#2A333C"/>
  <!-- beak open (surprise) -->
  <path d="M186 206 q14 -10 28 0 q-4 22 -14 26 q-10 -4 -14 -26 Z" fill="#FBB23B" stroke="#2A333C" stroke-width="4" stroke-linejoin="round"/>
  <!-- feet -->
  <path d="M168 332 q-8 18 -28 18 q14 10 36 2 Z" fill="#FBB23B" stroke="#2A333C" stroke-width="4"/>
  <path d="M232 332 q8 18 28 18 q-14 10 -36 2 Z" fill="#FBB23B" stroke="#2A333C" stroke-width="4"/>
</svg>
