<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="柴犬キャラクター まめ">
  <defs>
    <linearGradient id="bgMame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF6E2"/>
      <stop offset="1" stop-color="#FCE4B0"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="360" height="360" rx="56" fill="url(#bgMame)"/>
  <!-- ears -->
  <path d="M118 96 L168 162 L96 168 Z" fill="#E8A85A" stroke="#3A3A3A" stroke-width="7" stroke-linejoin="round"/>
  <path d="M282 96 L304 168 L232 162 Z" fill="#E8A85A" stroke="#3A3A3A" stroke-width="7" stroke-linejoin="round"/>
  <!-- head -->
  <circle cx="200" cy="206" r="104" fill="#F1B968" stroke="#3A3A3A" stroke-width="7"/>
  <!-- muzzle -->
  <ellipse cx="200" cy="236" rx="74" ry="58" fill="#FFF7EC" stroke="#3A3A3A" stroke-width="6"/>
  <!-- brows white markings -->
  <circle cx="158" cy="186" r="20" fill="#FFF7EC"/>
  <circle cx="242" cy="186" r="20" fill="#FFF7EC"/>
  <!-- cheeks -->
  <circle cx="132" cy="232" r="17" fill="#FF9D8A" opacity="0.8"/>
  <circle cx="268" cy="232" r="17" fill="#FF9D8A" opacity="0.8"/>
  <!-- eyes -->
  <circle cx="160" cy="190" r="10" fill="#3A3A3A"/>
  <circle cx="240" cy="190" r="10" fill="#3A3A3A"/>
  <circle cx="156" cy="186" r="3" fill="#FFFFFF"/>
  <circle cx="236" cy="186" r="3" fill="#FFFFFF"/>
  <!-- nose -->
  <ellipse cx="200" cy="222" rx="13" ry="10" fill="#3A3A3A"/>
  <!-- happy open mouth -->
  <path d="M200 232 q-2 26 -28 30 q-16 -2 -18 -18 M200 232 q2 26 28 30 q16 -2 18 -18" fill="none" stroke="#3A3A3A" stroke-width="6" stroke-linecap="round"/>
  <path d="M186 256 q14 16 28 0 Z" fill="#FF7A8A"/>
</svg>
