<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="しろくまキャラクター もちまる">
  <defs>
    <linearGradient id="bgMochi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFEFE6"/>
      <stop offset="1" stop-color="#FFD9C7"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="360" height="360" rx="56" fill="url(#bgMochi)"/>
  <!-- body -->
  <ellipse cx="200" cy="278" rx="118" ry="96" fill="#FFFFFF" stroke="#3A3A3A" stroke-width="7"/>
  <!-- ears -->
  <circle cx="118" cy="150" r="40" fill="#FFFFFF" stroke="#3A3A3A" stroke-width="7"/>
  <circle cx="282" cy="150" r="40" fill="#FFFFFF" stroke="#3A3A3A" stroke-width="7"/>
  <circle cx="118" cy="150" r="18" fill="#FFC7B2"/>
  <circle cx="282" cy="150" r="18" fill="#FFC7B2"/>
  <!-- head -->
  <circle cx="200" cy="185" r="98" fill="#FFFFFF" stroke="#3A3A3A" stroke-width="7"/>
  <!-- cheeks -->
  <circle cx="146" cy="205" r="22" fill="#FFB7A0" opacity="0.85"/>
  <circle cx="254" cy="205" r="22" fill="#FFB7A0" opacity="0.85"/>
  <!-- eyes happy closed -->
  <path d="M150 178 q14 -20 28 0" fill="none" stroke="#3A3A3A" stroke-width="7" stroke-linecap="round"/>
  <path d="M222 178 q14 -20 28 0" fill="none" stroke="#3A3A3A" stroke-width="7" stroke-linecap="round"/>
  <!-- nose / mouth -->
  <ellipse cx="200" cy="208" rx="9" ry="7" fill="#3A3A3A"/>
  <path d="M200 215 q-16 22 -34 8 M200 215 q16 22 34 8" fill="none" stroke="#3A3A3A" stroke-width="6" stroke-linecap="round"/>
  <!-- little arm wave -->
  <circle cx="92" cy="252" r="24" fill="#FFFFFF" stroke="#3A3A3A" stroke-width="7"/>
</svg>
