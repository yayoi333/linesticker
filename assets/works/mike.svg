<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="三毛猫キャラクター みけ">
  <defs>
    <linearGradient id="bgMike" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E9FBF6"/>
      <stop offset="1" stop-color="#C7F3E6"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="360" height="360" rx="56" fill="url(#bgMike)"/>
  <!-- ears -->
  <path d="M120 110 L150 178 L92 172 Z" fill="#FFFFFF" stroke="#3A3A3A" stroke-width="7" stroke-linejoin="round"/>
  <path d="M280 110 L308 172 L250 178 Z" fill="#FBC65B" stroke="#3A3A3A" stroke-width="7" stroke-linejoin="round"/>
  <!-- head -->
  <circle cx="200" cy="200" r="104" fill="#FFFFFF" stroke="#3A3A3A" stroke-width="7"/>
  <!-- calico patch -->
  <path d="M200 96 a104 104 0 0 1 88 150 q-60 -40 -88 -150 Z" fill="#FBC65B" opacity="0.9"/>
  <path d="M120 250 a104 104 0 0 0 36 36 q-30 -4 -36 -36 Z" fill="#D9A441" opacity="0.6"/>
  <!-- cheeks -->
  <circle cx="138" cy="222" r="20" fill="#FFB1C4" opacity="0.85"/>
  <circle cx="262" cy="222" r="20" fill="#FFB1C4" opacity="0.85"/>
  <!-- eye open + wink -->
  <circle cx="160" cy="196" r="11" fill="#3A3A3A"/>
  <circle cx="156" cy="192" r="3.5" fill="#FFFFFF"/>
  <path d="M226 196 q14 -16 28 0" fill="none" stroke="#3A3A3A" stroke-width="7" stroke-linecap="round"/>
  <!-- nose / mouth -->
  <path d="M196 214 l8 0 l-4 6 z" fill="#FF8FA8"/>
  <path d="M200 220 q-12 16 -24 6 M200 220 q12 16 24 6" fill="none" stroke="#3A3A3A" stroke-width="6" stroke-linecap="round"/>
  <!-- whiskers -->
  <path d="M110 206 l40 6 M112 226 l38 -2 M290 206 l-40 6 M288 226 l-38 -2" stroke="#3A3A3A" stroke-width="4" stroke-linecap="round"/>
</svg>
