<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="パンダキャラクター ぽんた">
  <defs>
    <linearGradient id="bgPon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2F1FB"/>
      <stop offset="1" stop-color="#DBD8F2"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="360" height="360" rx="56" fill="url(#bgPon)"/>
  <!-- ears -->
  <circle cx="120" cy="138" r="38" fill="#3A3A3A"/>
  <circle cx="280" cy="138" r="38" fill="#3A3A3A"/>
  <!-- head -->
  <circle cx="200" cy="200" r="106" fill="#FFFFFF" stroke="#3A3A3A" stroke-width="7"/>
  <!-- eye patches (sleepy) -->
  <ellipse cx="156" cy="196" rx="30" ry="36" fill="#3A3A3A" transform="rotate(-18 156 196)"/>
  <ellipse cx="244" cy="196" rx="30" ry="36" fill="#3A3A3A" transform="rotate(18 244 196)"/>
  <!-- sleepy closed eyes -->
  <path d="M142 198 q14 10 28 0" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
  <path d="M230 198 q14 10 28 0" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
  <!-- cheeks -->
  <circle cx="132" cy="238" r="18" fill="#FFB0C2" opacity="0.8"/>
  <circle cx="268" cy="238" r="18" fill="#FFB0C2" opacity="0.8"/>
  <!-- nose / mouth small -->
  <ellipse cx="200" cy="236" rx="10" ry="8" fill="#3A3A3A"/>
  <path d="M200 244 q-8 10 -16 4 M200 244 q8 10 16 4" fill="none" stroke="#3A3A3A" stroke-width="5" stroke-linecap="round"/>
  <!-- zzz -->
  <text x="300" y="120" font-family="'Poppins', sans-serif" font-size="34" font-weight="700" fill="#8A86C9">z</text>
  <text x="322" y="96" font-family="'Poppins', sans-serif" font-size="24" font-weight="700" fill="#A9A6DA">z</text>
</svg>
